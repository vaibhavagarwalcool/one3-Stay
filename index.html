<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Properties & Services - Jaipur</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="site-header">
  <h1 id="bizName">Loading...</h1>
  <p>Your Trusted Real Estate & Service Partner</p>
</header>

<div class="partner-banner">
  <strong>Partner with us!</strong> Chat if you are a: 
  <a href="#" onclick="waPartner('Broker')">Broker</a> • 
  <a href="#" onclick="waPartner('Tenant')">Tenant</a> • 
  <a href="#" onclick="waPartner('Supplier')">Supplier</a> • 
  <a href="#" onclick="waPartner('Interior Designer')">Interior</a> • 
  <a href="#" onclick="waPartner('Lawyer')">Lawyer</a>
</div>

<nav class="tabs">
  <button class="active" data-tab="properties" onclick="showTab('properties')">🏠 Properties</button>
  <button data-tab="tiffin" onclick="showTab('tiffin')">🍱 Tiffin</button>
  <button data-tab="inventory" onclick="showTab('inventory')">📦 Shop</button>
  <button data-tab="services" onclick="showTab('services')">🛠️ Services</button>
  <button data-tab="form" onclick="showTab('form')">📝 Inquire</button>
</nav>

<main>
  <section id="tab-properties">
    <div class="search-bar">
      <input id="searchBox" placeholder="Search areas, keywords..." oninput="filterProperties()">
      <select id="typeFilter" onchange="filterProperties()">
        <option value="">All Categories</option>
        <option value="flat">Flats</option>
        <option value="homestay">Homestays</option>
        <option value="hourly">Hourly Stays</option>
        <option value="land">Land</option>
      </select>
    </div>
    <div class="grid" id="propertiesGrid"><div class="empty">Loading...</div></div>
  </section>

  <section id="tab-tiffin" style="display:none">
    <div class="grid" id="tiffinGrid"><div class="empty">Loading...</div></div>
  </section>

  <section id="tab-inventory" style="display:none">
    <div class="grid" id="inventoryGrid"><div class="empty">Loading...</div></div>
  </section>

  <section id="tab-services" style="display:none">
    <h3 style="margin-top:0">Additional Services We Provide</h3>
    <div class="services-grid" id="servicesGrid">
      </div>
  </section>

  <section id="tab-form" style="display:none">
    <form class="panel" id="inquiryForm">
      <h3>Submit a Query</h3>
      <label>Name</label><input name="name" required>
      <label>Phone</label><input name="phone" required>
      <label>Type</label>
      <select name="type">
        <option value="general">General Query</option>
        <option value="list_property">List my property</option>
      </select>
      <label>Message</label>
      <textarea name="message" required></textarea>
      <button type="submit" class="btn primary">Submit</button>
      <div id="formMsg" class="muted"></div>
    </form>
  </section>
</main>

<div id="detailModal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" id="modalBody"></div>
</div>

<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
